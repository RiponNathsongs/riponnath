<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripon Nath Music</title>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
header{background:#000;padding:15px;text-align:center;font-size:22px;font-weight:bold}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px}
.card{background:#1c1c1c;border-radius:10px;overflow:hidden;cursor:pointer;transition:.3s}
.card:hover{transform:scale(1.05)}
.card img{width:100%}
.card p{padding:10px;font-size:14px}

/* FLOATING PLAYER */
.player{
 position:fixed;
 top:100px;
 left:100px;
 width:300px;
 background:#111;
 border-radius:10px;
 padding:10px;
 z-index:9999;
 display:none;
 cursor:move;
}

.player iframe{
 width:100%;
 height:170px;
 border-radius:10px;
}

.controls{
 display:flex;
 justify-content:space-between;
 margin-top:8px;
}

button{
 padding:6px 10px;
 border:none;
 border-radius:5px;
 cursor:pointer;
}

.closeBtn{background:red;color:white}

</style>
</head>
<body>

<header>🎵 Ripon Nath Music</header>

<div class="container">
<h2>All Songs</h2>
<div class="grid" id="songGrid"></div>
</div>

<!-- FLOATING PLAYER -->
<div class="player" id="player">
<iframe id="musicFrame" src="" frameborder="0" allow="autoplay"></iframe>
<div class="controls">
<button onclick="prevSong()">⏮</button>
<button onclick="nextSong()">⏭</button>
<button class="closeBtn" onclick="closePlayer()">✖</button>
</div>
</div>

<script>
const songs=[
"d_XaQAdOdZk","jKEIQWeyyUI","cNzblRC5nI0","8eSjhIFPEPY","VR27nxaTzn8","7OE25aNgzOY","F55YFwMisFA","quEd0V944tU","FDgDo_5wcps","1mWPaBvo5Ns","NJa8VEILPZY","dalOy2ipVvo","OpQWHXIo0Vo","XCq-g4b67iw","Vm-yZZdNkXU","fFe86asIBcc","YcrYyVBle_c","6v89J39ghyk","X4Ym-6Jz2cE","HehySB_2YfY","o4c-ZKU9V-o","5yYYZJVrttg","APzgK89PWKs","OyKf7RQ9GDY","dMCHrcKgJrI","lANVJtndZzU","kRwuOkTC5Vk","NX-atj4MJww","qlqqHV2zNJQ","7CAYN8VXzj0","GuvNxP8Vr9U","o7VLbB6VbYI","njBZFd97R10","THRFH1EAzJM","wGW_B7kw3lI","Kp5svOiogoc"
];

let currentIndex=0;
const grid=document.getElementById("songGrid");

songs.forEach((id,index)=>{
 const card=document.createElement("div");
 card.className="card";
 card.innerHTML=`<img src="https://img.youtube.com/vi/${id}/0.jpg"><p>Play Song</p>`;
 card.onclick=()=>playSong(index);
 grid.appendChild(card);
});

function playSong(index){
 currentIndex=index;
 document.getElementById('player').style.display='block';
 document.getElementById('musicFrame').src="https://www.youtube.com/embed/"+songs[index]+"?autoplay=1";
}

function nextSong(){
 currentIndex=(currentIndex+1)%songs.length;
 playSong(currentIndex);
}

function prevSong(){
 currentIndex=(currentIndex-1+songs.length)%songs.length;
 playSong(currentIndex);
}

function closePlayer(){
 document.getElementById('player').style.display='none';
 document.getElementById('musicFrame').src="";
}

// DRAG FUNCTION
const player=document.getElementById("player");
let isDragging=false,offsetX,offsetY;

player.addEventListener("mousedown",e=>{
 isDragging=true;
 offsetX=e.clientX-player.offsetLeft;
 offsetY=e.clientY-player.offsetTop;
});

document.addEventListener("mousemove",e=>{
 if(isDragging){
  player.style.left=(e.clientX-offsetX)+"px";
  player.style.top=(e.clientY-offsetY)+"px";
 }
});

document.addEventListener("mouseup",()=>isDragging=false);
</script>

</body>
</html>
