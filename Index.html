<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripon Nath Music</title>

<style>
body {margin:0;font-family:Arial;background:#0f0f0f;color:white}
header {background:#000;padding:15px;text-align:center;font-size:22px;font-weight:bold}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px}
.card{background:#1c1c1c;border-radius:10px;overflow:hidden;cursor:pointer;transition:.3s}
.card:hover{transform:scale(1.05)}
.card img{width:100%}
.card p{padding:10px;font-size:14px}
.player{position:fixed;bottom:0;left:0;width:100%;background:#111;padding:10px;display:flex;align-items:center;justify-content:space-between}
.player iframe{width:300px;height:80px}
.equalizer{display:flex;gap:3px}
.bar{width:4px;height:20px;background:#00ffcc;animation:bounce 1s infinite ease-in-out}
.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.6s}
.bar:nth-child(5){animation-delay:.8s}
@keyframes bounce{0%,100%{height:10px}50%{height:25px}}
</style>
</head>
<body>
<header>🎵 Ripon Nath Music</header>
<div class="container">
<h2>All Songs</h2>
<div class="grid" id="songGrid"></div>
</div>
<div class="player" id="player" style="display:none;">
<div class="equalizer">
<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
</div>
<iframe id="musicFrame" src="" frameborder="0" allow="autoplay"></iframe>
<button onclick="closePlayer()">❌</button>
</div>
<script>
const songs=[
"d_XaQAdOdZk","jKEIQWeyyUI","cNzblRC5nI0","8eSjhIFPEPY","VR27nxaTzn8","7OE25aNgzOY","F55YFwMisFA","quEd0V944tU","FDgDo_5wcps","1mWPaBvo5Ns","NJa8VEILPZY","dalOy2ipVvo","OpQWHXIo0Vo","XCq-g4b67iw","Vm-yZZdNkXU","fFe86asIBcc","YcrYyVBle_c","6v89J39ghyk","X4Ym-6Jz2cE","HehySB_2YfY","o4c-ZKU9V-o","5yYYZJVrttg","APzgK89PWKs","OyKf7RQ9GDY","dMCHrcKgJrI","lANVJtndZzU","kRwuOkTC5Vk","NX-atj4MJww","qlqqHV2zNJQ","7CAYN8VXzj0","GuvNxP8Vr9U","o7VLbB6VbYI","njBZFd97R10","THRFH1EAzJM","wGW_B7kw3lI","Kp5svOiogoc"
];

const grid=document.getElementById("songGrid");

songs.forEach(id=>{
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<img src="https://img.youtube.com/vi/${id}/0.jpg"><p>Ripon Nath Song</p>`;
  card.onclick=()=>playSong(id);
  grid.appendChild(card);
});

function playSong(id){
 document.getElementById('player').style.display='flex';
 document.getElementById('musicFrame').src="https://www.youtube.com/embed/"+id+"?autoplay=1";
}

function closePlayer(){
 document.getElementById('player').style.display='none';
 document.getElementById('musicFrame').src="";
}
</script>
</body>
</html>
