<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ Google Verification (KEEP) -->
<meta name="google-site-verification" content="SAmaKfnAyKzfxWGySUlgohUGNk5iha_iuZqJAqzmPFw" />

<title>Ripon Nath Music | Bangla Hindi Lofi</title>
<meta name="description" content="Listen Bangla & Hindi songs online. Ripon Nath music collection.">

<style>
html{scroll-behavior:smooth}
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
header{background:#000;padding:15px;text-align:center;font-size:22px;font-weight:bold}
.container{padding:20px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:15px}
.card{background:#1c1c1c;border-radius:10px;overflow:hidden;cursor:pointer;transition:.4s;opacity:0;transform:translateY(40px)}
.card.show{opacity:1;transform:translateY(0)}
.card:hover{transform:scale(1.05)}
.card img{width:100%}
.card p{padding:10px;font-size:14px}

/* FLOATING PLAYER (macOS style) */
.player{
 position:fixed;
 top:100px;
 left:100px;
 width:300px;
 background:#f5f5f5;
 color:#000;
 border-radius:15px;
 box-shadow:0 15px 35px rgba(0,0,0,0.4);
 display:none;
 z-index:9999;
 overflow:hidden;
 cursor:move;
}

/* macOS dots */
.topbar{
 display:flex;
 gap:6px;
 padding:8px;
 background:#e0e0e0;
}
.dot{width:10px;height:10px;border-radius:50%}
.red{background:#ff5f57}
.yellow{background:#ffbd2e}
.green{background:#28c840}

.equalizer{
 display:flex;
 justify-content:center;
 align-items:end;
 height:80px;
 gap:5px;
 margin:15px 0;
}
.bar{
 width:6px;
 background:linear-gradient(180deg,#00ff99,#00cc66);
 animation:equalize 1s infinite ease-in-out;
}
.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.6s}
.bar:nth-child(5){animation-delay:.8s}

@keyframes equalize{0%,100%{height:20px}50%{height:70px}}

.controls{display:flex;justify-content:space-around;padding:10px}
button{padding:6px 10px;border:none;border-radius:5px;cursor:pointer}
.playBtn{background:#00cc66;color:white}
.closeBtn{background:red;color:white}

.hiddenFrame{display:none}
</style>
</head>

<body>
<header>🎵 Ripon Nath Music</header>

<div class="container">
<h2>All Songs</h2>
<div class="grid" id="songGrid"></div>
</div>

<!-- PLAYER -->
<div class="player" id="player">
 <div class="topbar">
  <div class="dot red" onclick="closePlayer()"></div>
  <div class="dot yellow"></div>
  <div class="dot green"></div>
 </div>

 <div class="equalizer">
  <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
 </div>

 <div class="controls">
  <button onclick="prevSong()">⏮</button>
  <button class="playBtn" onclick="togglePlay()">⏯</button>
  <button onclick="nextSong()">⏭</button>
 </div>
</div>

<!-- Hidden YouTube -->
<iframe id="musicFrame" class="hiddenFrame" src="" allow="autoplay"></iframe>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const songs=["d_XaQAdOdZk","jKEIQWeyyUI","cNzblRC5nI0","8eSjhIFPEPY","VR27nxaTzn8"];
let currentIndex=0;
let playerYT;

function onYouTubeIframeAPIReady(){
 playerYT=new YT.Player('musicFrame',{events:{'onStateChange':onPlayerStateChange}});
}

function onPlayerStateChange(event){
 if(event.data==YT.PlayerState.ENDED){
  nextSong();
 }
}

const grid=document.getElementById("songGrid");
songs.forEach((id,index)=>{
 const card=document.createElement("div");
 card.className="card";
 card.innerHTML=`<img src="https://img.youtube.com/vi/${id}/0.jpg"><p>Play Song</p>`;
 card.onclick=()=>playSong(index);
 grid.appendChild(card);
});

// scroll animation
const observer=new IntersectionObserver(entries=>{
 entries.forEach(entry=>{
  if(entry.isIntersecting){entry.target.classList.add("show");}
 });
});
document.querySelectorAll('.card').forEach(el=>observer.observe(el));

function playSong(index){
 currentIndex=index;
 document.getElementById('player').style.display='block';
 playerYT.loadVideoById(songs[index]);
}

function nextSong(){
 currentIndex=(currentIndex+1)%songs.length;
 playSong(currentIndex);
}

function prevSong(){
 currentIndex=(currentIndex-1+songs.length)%songs.length;
 playSong(currentIndex);
}

function togglePlay(){
 const state=playerYT.getPlayerState();
 if(state==1){playerYT.pauseVideo();}
 else{playerYT.playVideo();}
}

function closePlayer(){
 document.getElementById('player').style.display='none';
 playerYT.stopVideo();
}

// drag
const player=document.getElementById("player");
let isDragging=false,offsetX,offsetY;
player.addEventListener("mousedown",e=>{isDragging=true;offsetX=e.clientX-player.offsetLeft;offsetY=e.clientY-player.offsetTop;});
document.addEventListener("mousemove",e=>{if(isDragging){player.style.left=(e.clientX-offsetX)+"px";player.style.top=(e.clientY-offsetY)+"px";}});
document.addEventListener("mouseup",()=>isDragging=false);
</script>

</body>
</html>
